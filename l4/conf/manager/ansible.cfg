# /etc/ansible/ansible.cfg — Configuración global de Ansible
# Práctica GP4 - Gestión de configuración mediante Ansible
#
# NOTA PARA EL ALUMNO:
#   Este fichero configura el comportamiento por defecto de Ansible.
#   La clave privada apunta al par RSA generado para el usuario vagrant.
#   No es necesario modificar este fichero para las partes 1-3 de la práctica.

[defaults]
inventory          = /etc/ansible/hosts
remote_user        = kenobi
private_key_file   = /home/kenobi/.ssh/id_rsa
host_key_checking  = False

# Prevent annoying interpreter discovery warnings as explained on
# https://docs.ansible.com/projects/ansible-core/2.20/reference_appendices/interpreter_discovery.html
interpreter_python = auto_silent

[privilege_escalation]
become          = True
become_method   = sudo
become_user     = root
become_ask_pass = False
