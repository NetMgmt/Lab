; For more information on the config file, please see:
; http://supervisord.org/configuration.html

[unix_http_server]
file  = /tmp/supervisor.sock    ; the path to the socket file
chmod = 0770                    ; allow members of the supervisord group to interact.
                                ; This is 0700 by default.
chown = supervisord:supervisord ; socket file uid:gid owner (default nobody:nogroup)

[supervisord]
logfile          =/tmp/supervisord.log  ; main log file; default $CWD/supervisord.log
logfile_maxbytes = 50MB                 ; max main logfile bytes b4 rotation; default 50MB
logfile_backups  = 10                   ; # of main logfile backups; 0 means none, default 10
loglevel         = info                 ; log level; default info; others: debug,warn,trace
pidfile          = /tmp/supervisord.pid ; supervisord pidfile; default supervisord.pid
nodaemon         = true                 ; start in foreground if true; default false
silent           = false                ; no logs to stdout if true; default false
minfds           = 1024                 ; min. avail startup file descriptors; default 1024
minprocs         = 200                  ; min. avail process descriptors;default 200
user             = root                 ; setuid to this UNIX account at startup; recommended if root

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl = unix:///tmp/supervisor.sock

[program:rsyslogd]
command         = /usr/sbin/rsyslogd -n
autostart       = true
redirect_stderr = true
stdout_logfile  = /tmp/rsyslogd.log
